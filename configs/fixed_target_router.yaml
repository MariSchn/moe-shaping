output_dir: "./outputs/fixed-target"

target:
  type: model  # "piecewise_linear" or "model"
  domain: [-1, 1]
  kwargs:
    num_experts: 4
    input_dim: 1
    output_dim: 1
    router_top_k: 2
    initial_router_weights:
    - [1.0]
    - [-1.0]
    - [1.0]
    - [-1.0]
    initial_router_biases:
      - 0.0
      - 0.0
      - 0.0
      - 0.0
    initial_gating_weights:
    - [-1.0]
    - [-0.5]
    - [0.5]
    - [1.0]
    initial_gating_biases: 
      - -0.50
      - -0.25
      - -0.25
      - -0.50

model:
  num_experts: 4
  input_dim: 1
  output_dim: 1
  router_top_k: 2

training:
  num_steps: 500
  batch_size: 100
  learning_rate: 0.01
  # Controls the weight of the Switch Transformer-style load balancing loss (1e-2 default from paper).
  load_balancing_loss_weight: 0.0
  # DeepSeek V3 auxiliary loss-free load balancing gamma, controlling how much is added/subtracted to under/over-utilized experts (1e-3 default from paper)
  auxiliarly_loss_free_load_balancing_gamma: 0.0

logging:
  log_plots_every_n_steps: 100

wandb:
  enabled: true
  project: fixed-target
  entity: mari-schn
  run_name: model-target
  run_tags: []
