name: no-load-balancing
project: moe-shaping
entity: mari-schn

method: grid
metric:
  name: loss
  goal: minimize

program: src/main.py
command:
  - ${env}
  - python
  - ${program}
  - --config
  - configs/fixed_target.yaml

parameters:
  training:
    parameters:
      learning_rate:
        values: [1e-4, 1e-3, 1e-2]
