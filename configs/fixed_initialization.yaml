output_dir: "./outputs/fixed_initialization"

target:
  num_pieces: 2
  domain: [-1, 1]
  breakpoint_mode: "linear"
  slopes: [1.0, -1.0]
  intercepts: [1.0, 1.0]
  breakpoints: [-1.0, 0.0, 1.0]

model:
  num_experts: 2
  input_dim: 1
  output_dim: 1
  router_top_k: 1
  initial_expert_weights:
    - [[1.0]]
    - [[-1.0]]
  initial_expert_biases:
    - [0.0]
    - [0.0]
  initial_gating_weights:
    - [1.0]
    - [-1.0]
  initial_gating_biases: 
    - 0.0
    - 0.0

training:
  num_steps: 1000
  batch_size: 100
  learning_rate: 0.01

logging:
  log_plots_every_n_steps: 100

wandb:
  enabled: true
  project: moe-shaping
  entity: mari-schn
  run_name: debug
  run_tags: []
