output_dir: "./outputs/fixed-imbalanced-target"
seed: 0

target:
  type: model  # "piecewise_linear" or "model"
  domain: [-1, 1]
  kwargs:
    num_experts: 4
    input_dim: 1
    output_dim: 1
    router_top_k: 2
    router_activation: softmax
    initial_expert_weights:
      - [[0.0]]
      - [[0.3]]
      - [[2.0]]
      - [[2.0]]
    initial_expert_biases:
      - [0.0]
      - [1.0]
      - [8.0]
      - [-8.0]
    initial_gating_weights:
      - [0.0]
      - [0.0]
      - [1.0]
      - [-1.0]
    initial_gating_biases:
      - 3.0
      - 2.9
      - 2.0
      - 2.0

model:
  num_experts: 4
  input_dim: 1
  output_dim: 1
  router_top_k: 2
  router_activation: softmax
  freeze_router: false
  freeze_experts: false

training:
  num_steps: 5000
  batch_size: 128
  learning_rate: 1e-2
  # One of: SGD, Adam, AdamW
  optimizer: Adam  
  # Controls the weight of the Switch Transformer-style load balancing loss (1e-2 default from paper).
  load_balancing_loss_weight: 0.0
  # DeepSeek V3 auxiliary loss-free load balancing gamma, controlling how much is added/subtracted to under/over-utilized experts (1e-3 default from paper)
  auxiliarly_loss_free_load_balancing_gamma: 0.0
  # Inter Router LOLA shaping weight. For each sample, the non-top selected experts
  inter_router_lola_weight: 0.0
  # Which selected expert plays the naive learner per sample: "top1" or "bottom1".
  lola_naive_learner: top1

logging:
  anim_sampling_rate: 50

wandb:
  enabled: true
  project: moe-shaping
  entity: mari-schn
  run_name: Imbalanced Target
  run_tags: []
